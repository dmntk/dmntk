[package]
name = "dmntk"
version = "0.0.3"
authors = ["Dariusz Depta <dariusz.depta@engos.software>"]
description = "WIP: DMNTK | Decision Model and Notation Toolkit."
documentation = "https://docs.rs/dmntk"
repository = "https://github.com/dmntk/dmntk.git"
readme = "QUICK_START_GUIDE.md"
license = "MIT"
edition = "2018"

[[bin]]
name = "dmntk"

[features]
default = []
bin = []

[dependencies]
dmntk-common = { path = "../common", version = "0.0.6"}
dmntk-evaluator = { path = "../evaluator", version = "0.0.6"}
dmntk-feel = { path = "../feel", version = "0.0.6"}
dmntk-feel-parser = { path = "../feel-parser", version = "0.0.6"}
serde = "^1.0.125"
serde_derive = "^1.0.125"
serde_yaml = "^0.8"