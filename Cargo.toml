[package]
name = "dmntk"
version = "0.0.36-dev"
authors = ["Dariusz Depta <dariusz.depta@engos.software>"]
description = "DMNTK | Decision Model and Notation Toolkit"
documentation = "https://docs.rs/dmntk"
repository = "https://github.com/dmntk/dmntk.git"
readme = "USAGE.md"
license = "MIT OR Apache-2.0"
edition = "2021"

[dependencies]
clap = { version = "2.33.3", features = ["yaml"] }
dmntk-common = { path = "../common" }
dmntk-evaluator = { path = "../evaluator" }
dmntk-feel = { path = "../feel" }
dmntk-feel-parser = { path = "../feel-parser" }
dmntk-recognizer = { path = "../recognizer" }
dmntk-server = { path = "../server" }
serde = "1.0.130"
serde_derive = "1.0.130"
serde_yaml = "0.8.21"