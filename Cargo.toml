[package]
name = "dmntk"
version = "0.0.38"
authors = ["Dariusz Depta <dariusz.depta@engos.software>"]
description = "DMNTK | Decision Model and Notation Toolkit"
documentation = "https://docs.rs/dmntk"
repository = "https://github.com/dmntk/dmntk.git"
license = "MIT OR Apache-2.0"
edition = "2021"

[dependencies]
clap = { version = "2.33.3", features = ["yaml"] }
dmntk-common = "0.0.38"
dmntk-evaluator = "0.0.38"
dmntk-feel = "0.0.38"
dmntk-feel-parser = "0.0.38"
dmntk-recognizer = "0.0.38"
dmntk-server = "0.0.38"
serde = "1.0.130"
serde_derive = "1.0.130"
serde_yaml = "0.8.21"