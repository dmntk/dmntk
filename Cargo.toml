[package]
name = "dmntk"
version = "0.0.7"
authors = ["Dariusz Depta <dariusz.depta@engos.software>"]
description = "DMNTK | Decision Model and Notation Toolkit"
documentation = "https://docs.rs/dmntk"
repository = "https://github.com/dmntk/dmntk.git"
readme = "USAGE.md"
license = "MIT"
edition = "2018"

[[bin]]
name = "dmntk"

[features]
default = []
bin = []

[dependencies]
dmntk-common = "0.0.7"
dmntk-evaluator = "0.0.7"
dmntk-feel = "0.0.7"
dmntk-feel-parser = "0.0.7"
dmntk-recognizer = "0.0.7"
dmntk-server = "0.0.7"
serde = "1.0.125"
serde_derive = "1.0.125"
serde_yaml = "0.8"